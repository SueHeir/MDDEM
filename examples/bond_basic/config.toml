# Bonded chain pull test
# 10 particles placed by setup_chain (no [[particles.insert]])

[domain]
# Simulation box extents [m]
x_low = -0.005
x_high = 0.005
y_low = -0.005
y_high = 0.005
z_low = -0.001
z_high = 0.030
periodic_x = false
periodic_y = false
periodic_z = false

[neighbor]
# skin_fraction: neighbor search radius multiplier [dimensionless, typically 1.0–1.5]
skin_fraction = 1.1
# bin_size: neighbor-list bin width [m] — should be >= largest particle diameter
bin_size = 0.005

[[dem.materials]]
name = "glass"
youngs_mod = 8.7e9       # Young's modulus [Pa] — used for particle-particle Hertz contact
poisson_ratio = 0.3      # Poisson's ratio [dimensionless, 0–0.5]
restitution = 0.95       # Coefficient of restitution [0–1]
friction = 0.4           # Sliding friction coefficient [dimensionless]

# Bottom particle: frozen in place
[[group]]
name = "bottom"
region = { type = "block", min = [-1e30, -1e30, 0.0], max = [1e30, 1e30, 0.002] }

# Top particle: pulled upward
[[group]]
name = "top"
region = { type = "block", min = [-1e30, -1e30, 0.018], max = [1e30, 1e30, 0.030] }

[[freeze]]
group = "bottom"

[[addforce]]
group = "top"
fz = 0.01                # Applied force [N] — constant upward pull on the top particle

[bonds]
# auto_bond: automatically bond all particles within bonding distance at startup
auto_bond = true
# normal_stiffness: bond spring constant [N/m] — higher = stiffer bonds
normal_stiffness = 1e7
# normal_damping: bond viscous damping [N·s/m]
# Critical damping ~ 20; use 10 for stable underdamped settling
normal_damping = 10.0

[thermo]
columns = ["step", "bond_strain", "virial_zz", "ke", "walltime"]

[run]
thermo = 1000            # Print thermodynamic output every N steps
steps = 10000            # Total number of timesteps

[dump]
interval = 5000          # Write dump file every N steps
