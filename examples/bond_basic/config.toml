# Bonded chain pull test
# 10 particles placed by setup_chain (no [[particles.insert]])

[domain]
x_low = -0.005
x_high = 0.005
y_low = -0.005
y_high = 0.005
z_low = -0.001
z_high = 0.030
periodic_x = false
periodic_y = false
periodic_z = false

[neighbor]
skin_fraction = 1.1
bin_size = 0.005

[[dem.materials]]
name = "glass"
youngs_mod = 8.7e9
poisson_ratio = 0.3
restitution = 0.95
friction = 0.4

# Bottom particle: frozen in place
[[group]]
name = "bottom"
region = { type = "block", min = [-1e30, -1e30, 0.0], max = [1e30, 1e30, 0.002] }

# Top particle: pulled upward
[[group]]
name = "top"
region = { type = "block", min = [-1e30, -1e30, 0.018], max = [1e30, 1e30, 0.030] }

[[freeze]]
group = "bottom"

[[addforce]]
group = "top"
fz = 0.01

[bonds]
auto_bond = true
normal_stiffness = 1e7
# Critical damping ~ 20; use 10 for stable underdamped settling
normal_damping = 10.0

[thermo]
columns = ["step", "bond_strain", "virial_zz", "ke", "walltime"]

[run]
thermo = 1000
steps = 10000

[dump]
interval = 5000
