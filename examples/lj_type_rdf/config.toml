# LJ Liquid with Type-Filtered RDF Measurement
#
# Demonstrates type-filtered RDF using SPC/E O-O LJ parameters in reduced units.
# This same setup works for any multi-type simulation (binary mixtures, alloys, etc.).
#
# SPC/E O-O LJ parameters (real units):
#   epsilon = 0.1553 kcal/mol
#   sigma   = 3.166 Angstrom
#
# In reduced units (epsilon* = 1, sigma* = 1):
#   Reduced density rho* ~ 0.85 (liquid-like)
#   Reduced temperature T* ~ 0.85 (well below critical T*_c ~ 1.3)

[domain]
x_low = 0.0
x_high = 12.0
y_low = 0.0
y_high = 12.0
z_low = 0.0
z_high = 12.0
periodic_x = true
periodic_y = true
periodic_z = true

[neighbor]
skin_fraction = 1.12
bin_size = 1.0

[lattice]
style = "fcc"
density = 0.85       # reduced number density rho*
temperature = 0.85   # reduced temperature T*
mass = 1.0           # particle mass (reduced units)
skin = 1.25          # neighbor skin distance

[lj]
epsilon = 1.0        # SPC/E O-O in reduced units
sigma = 1.0          # SPC/E O-O in reduced units
cutoff = 3.0         # cutoff in sigma units (9.498 Angstrom equivalent)

[langevin]
temperature = 0.85   # target reduced temperature
damping = 1.0        # friction coefficient
seed = 42

[[run]]
steps = 5000
thermo = 500

[[run]]
steps = 15000
thermo = 1000

[measure]
rdf_bins = 200
rdf_cutoff = 4.0     # measure RDF out to 4 sigma
rdf_interval = 50    # accumulate every 50 steps
msd_interval = 50
output_interval = 5000

# Type-filtered RDF: measure O-O pair correlation
# Use [[type_rdf]] array to support multiple type pairs simultaneously
[[type_rdf]]
type_i = 0           # oxygen type index
type_j = 0           # oxygen type index (O-O RDF)
bins = 200
cutoff = 4.0
interval = 50
output_interval = 5000

[dump]
interval = 0
