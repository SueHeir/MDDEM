# LJ benchmark: 10000 atoms (10x10x25 FCC), 500 steps

[domain]
x_low = 0.0
x_high = 16.80
y_low = 0.0
y_high = 16.80
z_low = 0.0
z_high = 42.00
periodic_x = true
periodic_y = true
periodic_z = true

[neighbor]
skin_fraction = 1.12
bin_size = 1.4
every = 20
check = true

[lattice]
style = "fcc"
density = 0.8442
temperature = 1.44
mass = 1.0
skin = 1.25

[lj]
epsilon = 1.0
sigma = 1.0
cutoff = 2.5

[thermostat]
temperature = 1.44
coupling = 1.0

[run]
steps = 500
thermo = 500

[measure]
rdf_interval = 0
msd_interval = 0
output_interval = 0

[dump]
interval = 0
