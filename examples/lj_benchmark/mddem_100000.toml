# LJ benchmark: ~100k atoms (29x29x30 FCC), 200 steps

[domain]
x_low = 0.0
x_high = 48.7083
y_low = 0.0
y_high = 48.7083
z_low = 0.0
z_high = 50.3879
periodic_x = true
periodic_y = true
periodic_z = true

[neighbor]
skin_fraction = 1.12
bin_size = 1.4
every = 20
check = true

[lattice]
style = "fcc"
density = 0.8442
temperature = 1.44
mass = 1.0
skin = 1.25

[lj]
epsilon = 1.0
sigma = 1.0
cutoff = 2.5

[thermostat]
temperature = 1.44
coupling = 1.0

[run]
steps = 200
thermo = 200

[dump]
interval = 0

[measure]
rdf_interval = 0
msd_interval = 0
output_interval = 0
