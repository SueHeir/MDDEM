# Beverloo hopper discharge benchmark
# Validates mass flow rate against W = C * rho_bulk * sqrt(g) * (D - k*d)^(3/2) (2D)
#
# Flat-bottom rectangular hopper, periodic in y (quasi-2D slice).
# Central orifice at bottom. Particles fill, settle, then discharge.
#
# Key parameters (change orifice_half_width to test different D values):
#   Particle diameter d = 0.002 m
#   Default orifice width D = 0.016 m (= 8d)
#   Container width = 0.08 m (= 40d)
#   Container height = 0.12 m (= 60d)
#   Y depth = 0.004 m (= 2d, periodic — quasi-2D)
#
# To sweep orifice widths, create config variants or use a run script.

[comm]
processors_x = 1
processors_y = 1
processors_z = 1

[domain]
# Simulation box extents [m]
x_low = -0.04
x_high = 0.04
y_low = 0.0
y_high = 0.004               # Thin slab (2d) for quasi-2D
z_low = -0.05
z_high = 0.12
periodic_x = false
periodic_y = true             # Periodic in y for quasi-2D
periodic_z = false

[neighbor]
skin_fraction = 1.1           # Neighbor search radius multiplier [dimensionless]
bin_size = 0.005              # Neighbor-list bin width [m], >= largest diameter

[gravity]
gz = -9.81                    # Gravitational acceleration [m/s²]

[[dem.materials]]
name = "glass"
youngs_mod = 5.0e6            # Young's modulus [Pa] — reduced for faster contacts
poisson_ratio = 0.3           # Poisson's ratio [dimensionless]
restitution = 0.5             # Coefficient of restitution [0–1]
friction = 0.3                # Sliding friction coefficient [dimensionless]

[[particles.insert]]
material = "glass"
count = 3000                  # Number of particles
radius = 0.001                # Particle radius [m] → diameter d = 0.002 m
density = 2500.0              # Particle density [kg/m³]
velocity_z = -0.5             # Initial downward velocity [m/s]
# Insertion region: full width, thin y, upper part of box
region = { type = "block", min = [-0.035, 0.0, 0.02], max = [0.035, 0.004, 0.115] }

# ── Walls ──────────────────────────────────────────────────────────────────

# Left side wall (x = -0.04, normal +x)
[[wall]]
point_x = -0.04
point_y = 0.0
point_z = 0.0
normal_x = 1.0
normal_y = 0.0
normal_z = 0.0
material = "glass"

# Right side wall (x = 0.04, normal -x)
[[wall]]
point_x = 0.04
point_y = 0.0
point_z = 0.0
normal_x = -1.0
normal_y = 0.0
normal_z = 0.0
material = "glass"

# Ceiling (z = 0.12, normal -z)
[[wall]]
point_x = 0.0
point_y = 0.0
point_z = 0.12
normal_x = 0.0
normal_y = 0.0
normal_z = -1.0
material = "glass"

# Floor LEFT (z = 0, normal +z) — from x = -0.04 to x = -0.008 (orifice at center)
# For D = 8d = 0.016 m, half-orifice = 0.008 m, so floor goes from -0.04 to -0.008
[[wall]]
point_x = 0.0
point_y = 0.0
point_z = 0.0
normal_x = 0.0
normal_y = 0.0
normal_z = 1.0
material = "glass"
bound_x_high = -0.008

# Floor RIGHT (z = 0, normal +z) — from x = +0.008 to x = +0.04
[[wall]]
point_x = 0.0
point_y = 0.0
point_z = 0.0
normal_x = 0.0
normal_y = 0.0
normal_z = 1.0
material = "glass"
bound_x_low = 0.008

# Blocker wall — covers the orifice during filling (removed when settled)
[[wall]]
point_x = 0.0
point_y = 0.0
point_z = 0.0
normal_x = 0.0
normal_y = 0.0
normal_z = 1.0
material = "glass"
name = "blocker"
bound_x_low = -0.008
bound_x_high = 0.008

# Bottom catch wall (z = -0.05, normal +z) — prevents particles from falling forever
[[wall]]
point_x = 0.0
point_y = 0.0
point_z = -0.05
normal_x = 0.0
normal_y = 0.0
normal_z = 1.0
material = "glass"

# ── Measure plane at orifice ─────────────────────────────────────────────

[[measure_plane]]
name = "orifice"
point = [0.0, 0.0, -0.002]   # Just below the orifice floor
normal = [0.0, 0.0, -1.0]    # Downward (positive = exiting hopper)
report_interval = 2000        # Average over 2000 steps

# ── Output ───────────────────────────────────────────────────────────────

[output]
dir = "examples/bench_beverloo_hopper"

[vtp]
interval = 5000               # VTP visualization every N steps

# ── Run stages ───────────────────────────────────────────────────────────

# Stage 1: fill and settle
[[run]]
name = "filling"
dt = 5.0e-6                   # Timestep [s]
steps = 2000000               # Allow up to 2M steps for settling
thermo = 5000
thermo_keys = ["step", "atoms", "ke", "time"]

# Stage 2: discharge through orifice
[[run]]
name = "discharge"
dt = 5.0e-6                   # Timestep [s]
steps = 4000000               # Long enough for significant discharge
thermo = 5000
thermo_keys = ["step", "atoms", "ke", "time", "flow_rate_orifice", "crossings_orifice"]
