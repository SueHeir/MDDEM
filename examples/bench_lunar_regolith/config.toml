# Lunar Regolith Cohesive Angle of Repose — Default Config
#
# Column collapse test: particles settle in a narrow column, then the
# column walls are removed and the pile collapses under gravity.
# The final pile angle depends on friction, JKR adhesion, and gravity.
#
# This is the "demo" config. Use run_benchmark.py for the full parametric study.

[comm]
processors_x = 1
processors_y = 1
processors_z = 1

[domain]
x_low = -0.06           # [m] Wide enough for pile to spread
x_high = 0.06
y_low = 0.0             # [m] Quasi-2D: periodic in y
y_high = 0.006          # 3 particle diameters thick
z_low = 0.0             # [m] Floor level
z_high = 0.10
periodic_x = false
periodic_y = true       # Quasi-2D slice (2 particle diameters thick)
periodic_z = false

[neighbor]
skin_fraction = 1.2     # Extra skin for JKR extended range
bin_size = 0.004        # [m] ~2x particle diameter
every = 5
rebuild_on_pbc_wrap = true

[gravity]
gx = 0.0
gy = 0.0
gz = -1.62              # [m/s^2] Lunar surface gravity

[dem]
contact_model = "hertz"

[[dem.materials]]
name = "regolith"
youngs_mod = 5e6         # [Pa] Soft for computational tractability
poisson_ratio = 0.3
restitution = 0.3        # Low restitution for fast energy dissipation
friction = 0.5           # Typical for angular lunar regolith
rolling_friction = 0.1   # Resists rolling for realistic pile formation
surface_energy = 0.02    # [J/m^2] JKR adhesion — moderate cohesion

# Insert particles in a narrow column
# Column: x [-0.012, 0.012], z [0.002, 0.085]
# 500 particles gives enough mass for a multi-layered pile after collapse
[[particles.insert]]
material = "regolith"
count = 350              # Number of particles
radius = 0.001           # [m] 1 mm (scaled up from real regolith ~100 um)
density = 1500.0         # [kg/m^3] Typical lunar regolith bulk density
region = { type = "block", min = [-0.012, 0.0, 0.002], max = [0.012, 0.006, 0.09] }

# Floor wall
[[wall]]
point_z = 0.0
normal_z = 1.0
material = "regolith"

# Side walls to contain particles at domain edges
[[wall]]
point_x = -0.06
normal_x = 1.0
material = "regolith"

[[wall]]
point_x = 0.06
normal_x = -1.0
material = "regolith"

# Ceiling wall to prevent particles escaping upward
[[wall]]
point_z = 0.095
normal_z = -1.0
material = "regolith"

# Column containment walls (removed during collapse phase)
[[wall]]
point_x = -0.012
normal_x = 1.0            # Normal points +x (inward), contains particles
material = "regolith"
name = "column_left"

[[wall]]
point_x = 0.012
normal_x = -1.0            # Normal points -x (inward), contains particles
material = "regolith"
name = "column_right"

[output]
dir = "examples/bench_lunar_regolith/output"

# Stage 1: Let particles settle inside the column
[[run]]
name = "settling"
steps = 50000            # Enough to settle under gravity
thermo = 5000
dt = 1e-5                # [s] ~15% of Rayleigh time for E=5e6
dump_interval = 50000

# Stage 2: Column collapse — pile spreads and forms angle of repose
[[run]]
name = "collapse"
steps = 100000           # 1s of collapse and settling
thermo = 5000
dt = 1e-5
dump_interval = 10000    # Frequent dumps to track collapse
