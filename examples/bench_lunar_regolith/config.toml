# Lunar Regolith Cohesive Angle of Repose — Default Config
#
# Draining-box method: particles settle in a walled box, the "gate" wall is
# removed once KE drops, and the remaining pile's angle of repose is measured.
#
# This is the "demo" config. Use run_benchmark.py for the full parametric study.

[comm]
processors_x = 1
processors_y = 1
processors_z = 1

[domain]
x_low = -0.05           # [m] Left wall side
x_high = 0.12           # [m] Drain area extends right
y_low = 0.0             # [m] Quasi-2D: periodic in y
y_high = 0.010           # [m] ~5 particle diameters thick
z_low = 0.0             # [m] Floor level
z_high = 0.20            # [m] Tall enough for particle column
periodic_x = false
periodic_y = true        # Quasi-2D slice
periodic_z = false
boundary_z = "shrink-wrap"

[neighbor]
skin_fraction = 1.2      # Extra skin for JKR extended range
bin_size = 0.004         # [m] ~2x particle diameter
every = 5
rebuild_on_pbc_wrap = true

[gravity]
gx = 0.0
gy = 0.0
gz = -1.62               # [m/s^2] Lunar surface gravity

[dem]
contact_model = "hertz"

[[dem.materials]]
name = "regolith"
youngs_mod = 5e6          # [Pa] Soft for computational tractability
poisson_ratio = 0.3
restitution = 0.1         # Low restitution for fast energy dissipation
friction = 0.5            # Typical for angular lunar regolith
rolling_friction = 1.0    # High rolling friction for realistic pile formation
surface_energy = 0.02     # [J/m^2] JKR adhesion — moderate cohesion

# Count-based insertion in a tall narrow column
[[particles.insert]]
material = "regolith"
radius = 0.001            # [m] 1 mm
density = 1500.0          # [kg/m^3]
count = 5000              # Total particles
velocity_z = -0.5         # [m/s] Initial downward velocity
region = { type = "block", min = [-0.035, 0.0, 0.005], max = [-0.015, 0.010, 0.195] }

# Floor wall
[[wall]]
point_z = 0.0
normal_z = 1.0
material = "regolith"

# Left wall (containment)
[[wall]]
point_x = -0.04
normal_x = 1.0
material = "regolith"

# Far right wall (catch boundary, well away from pile)
[[wall]]
point_x = 0.12
normal_x = -1.0
material = "regolith"

# Gate wall — removed after settling to let particles drain
[[wall]]
point_x = -0.01
normal_x = -1.0
material = "regolith"
name = "gate"

[output]
dir = "examples/bench_lunar_regolith/output"

# Stage 1: settle particles in the box
[[run]]
name = "settle"
steps = 200000
thermo = 20000
dt = 5e-6

# Stage 2: gate removed, particles drain
[[run]]
name = "drain"
steps = 200000
thermo = 20000
dt = 5e-6

# Stage 3: final settling and measurement
[[run]]
name = "measure"
steps = 100000
thermo = 20000
dt = 5e-6
dump_interval = 100000
save_at_end = true
