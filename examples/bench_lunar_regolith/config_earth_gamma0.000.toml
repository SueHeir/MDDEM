# Auto-generated config for: earth_gamma0.000
# Gravity: -9.81 m/s^2, Surface energy: 0.0 J/m^2
# Bond number: 0.000
# Method: draining box

[comm]
processors_x = 1
processors_y = 1
processors_z = 1

[domain]
x_low = -0.04
x_high = 0.12
y_low = 0.0
y_high = 0.010
z_low = 0.0
z_high = 0.15
periodic_x = false
periodic_y = true
periodic_z = false
boundary_z = "shrink-wrap"

[neighbor]
skin_fraction = 1.2
bin_size = 0.004
every = 5
rebuild_on_pbc_wrap = true

[gravity]
gx = 0.0
gy = 0.0
gz = -9.81

[dem]
contact_model = "hertz"

[[dem.materials]]
name = "regolith"
youngs_mod = 5e6
poisson_ratio = 0.3
restitution = 0.1
friction = 0.5
rolling_friction = 1.0
surface_energy = 0.0

# Count-based insertion in a narrow column (20mm wide, ~105mm tall packed)
[[particles.insert]]
material = "regolith"
radius = 0.001
density = 1500.0
count = 3000
velocity_z = -0.5
region = { type = "block", min = [-0.03, 0.0, 0.005], max = [-0.01, 0.010, 0.145] }

# Floor wall
[[wall]]
point_z = 0.0
normal_z = 1.0
material = "regolith"

# Left wall (containment)
[[wall]]
point_x = -0.04
normal_x = 1.0
material = "regolith"

# Far right wall (catch boundary)
[[wall]]
point_x = 0.12
normal_x = -1.0
material = "regolith"

# Gate wall — removed after settling
[[wall]]
point_x = -0.01
normal_x = -1.0
material = "regolith"
name = "gate"

[output]
dir = "/Users/elizabethsuehr/Documents/GitHub/MDDEM/examples/bench_lunar_regolith/output_earth_gamma0.000"

# Stage 1: settle particles in the box
[[run]]
name = "settle"
steps = 150000
thermo = 15000
dt = 5e-6

# Stage 2: gate removed, particles drain
[[run]]
name = "drain"
steps = 200000
thermo = 20000
dt = 5e-6

# Stage 3: final settling and measurement
[[run]]
name = "measure"
steps = 100000
thermo = 20000
dt = 5e-6
dump_interval = 100000
save_at_end = true
