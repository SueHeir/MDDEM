# Second-run config: skip FIRE (load from restart), run cooling only.
#
# Usage:
#   1. First run:  cargo run --example fire_packing
#   2. Second run: cargo run --example fire_packing -- examples/fire_packing/config_skip.toml

[comm]
processors_x = 1
processors_y = 1
processors_z = 1

[domain]
x_low = 0.0
x_high = 0.01
y_low = 0.0
y_high = 0.01
z_low = 0.0
z_high = 0.01
periodic_x = true
periodic_y = true
periodic_z = true

[neighbor]
skin_fraction = 1.1
bin_size = 0.003

[[dem.materials]]
name = "soft"
youngs_mod = 1e7
poisson_ratio = 0.3
restitution = 0.5
friction = 0.3

# No particle insertion — atoms come from restart file
[restart]
read = true

[fire]
ftol = 1e-2
dt_max_factor = 10.0
stop_on_converge = true

# Stage 1: skip FIRE (already converged, state loaded from restart)
[[run]]
name = "minimize"
steps = 50000
dt = 1e-6
thermo = 1000
skip = true

# Stage 2: Haff's cooling — same as first run
[[run]]
name = "cooling"
steps = 10000
dt = 1e-6
thermo = 500
