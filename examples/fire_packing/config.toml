[comm]
processors_x = 1
processors_y = 1
processors_z = 1

# Periodic cube — Haff's cooling needs periodic boundaries
[domain]
x_low = 0.0
x_high = 0.01
y_low = 0.0
y_high = 0.01
z_low = 0.0
z_high = 0.01
periodic_x = true
periodic_y = true
periodic_z = true

[neighbor]
# skin_fraction: neighbor search radius multiplier [dimensionless, typically 1.0–1.5]
skin_fraction = 1.1
# bin_size: neighbor-list bin width [m] — should be >= largest particle diameter
bin_size = 0.003

# Soft material so FIRE converges quickly
[[dem.materials]]
name = "soft"
youngs_mod = 1e7         # Young's modulus [Pa] — intentionally soft for fast FIRE convergence
poisson_ratio = 0.3      # Poisson's ratio [dimensionless, 0–0.5]
restitution = 0.5        # Coefficient of restitution [0–1]
friction = 0.3           # Sliding friction coefficient [dimensionless]

# ~20 particles at r=0.001 in a 0.01^3 box — low density for quick convergence
[[particles.insert]]
material = "soft"
count = 20
radius = 0.001           # Particle radius [m]
density = 2500.0         # Particle density [kg/m³]

[fire]
# ftol: force tolerance [N] — FIRE stops when max force on any particle drops below this
ftol = 1e-2
# dt_max_factor: maximum timestep as a multiple of the initial dt (limits adaptive stepping)
dt_max_factor = 10.0
# stop_on_converge: if true, end the current run stage early when FIRE converges
stop_on_converge = true

# Stage 1: FIRE minimization to remove overlaps (exits early on convergence)
[[run]]
name = "minimize"
steps = 50000
dt = 1e-6                # Timestep override [s] — overrides auto-computed dt for this stage
thermo = 1000
save_at_end = true       # Write a restart snapshot when this stage ends

# Stage 2: Haff's cooling — free dissipative granular gas
[[run]]
name = "cooling"
steps = 10000
dt = 1e-6                # Timestep override [s]
thermo = 500
