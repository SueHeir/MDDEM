# ═══════════════════════════════════════════════════════════════════════════════
# Conveyor Belt DEM Example
# ═══════════════════════════════════════════════════════════════════════════════
#
# A horizontal moving wall (conveyor belt) transports granular particles
# from an insertion zone to a measurement plane at the outlet.
#
# Geometry (side view, XZ plane):
#
#   z=0.02 ┌──────────────────────────────────────┐  ceiling
#          │  insertion zone        measurement    │
#   z=0.015│  ┌─────────┐          plane at       │
#          │  │ particles│          x=0.08         │
#   z=0.01 │  │ inserted │            │            │
#          │  │  here    │            │            │
#   z=0.005│  └─────────┘            ↓            │
#          │                                       │
#   z=0.0  │═══════════════════════════════════════│  belt (vx=0.05 m/s)
#          └──────────────────────────────────────┘
#   x=0.0                                    x=0.1
#
# ═══════════════════════════════════════════════════════════════════════════════

[comm]
processors = [1, 1, 1]

[domain]
x_lo = 0.0
x_hi = 0.1
y_lo = 0.0
y_hi = 0.01
z_lo = 0.0
z_hi = 0.025
x_periodic = false
y_periodic = true
z_periodic = false

[neighbor]
skin_fraction = 1.1
bin_size = 0.003

[gravity]
gx = 0.0
gy = 0.0
gz = -9.81

# ── Material definition ─────────────────────────────────────────────────────

[dem]
contact_model = "hertz"

[[dem.materials]]
name = "rubber"
youngs_mod = 1.0e7
poisson_ratio = 0.4
restitution = 0.3
friction = 0.6

# ── Rate-based particle insertion ────────────────────────────────────────────
#
# Particles are inserted above the belt in the left portion of the domain,
# falling under gravity onto the moving surface.

[[particles.insert]]
material = "rubber"
radius = 0.001
density = 1200.0
rate = 10
rate_interval = 2000
velocity_z = -0.5
region = [0.01, 0.04, 0.0, 0.01, 0.010, 0.018]

# ── Walls ────────────────────────────────────────────────────────────────────

# Belt surface: flat plane at z=0 with prescribed velocity in +x.
# This is a general "prescribed wall velocity" feature — any wall can have
# a constant velocity to model conveyors, rollers, or moving boundaries.
[[wall]]
point_x = 0.0
point_y = 0.0
point_z = 0.0
normal_x = 0.0
normal_y = 0.0
normal_z = 1.0
material = "rubber"
name = "belt"
velocity = [0.05, 0.0, 0.0]

# Left wall (particle containment)
[[wall]]
point_x = 0.0
point_y = 0.0
point_z = 0.0
normal_x = 1.0
normal_y = 0.0
normal_z = 0.0
material = "rubber"
name = "left_wall"

# Right wall (open-ish, far end)
[[wall]]
point_x = 0.1
point_y = 0.0
point_z = 0.0
normal_x = -1.0
normal_y = 0.0
normal_z = 0.0
material = "rubber"
name = "right_wall"

# Ceiling (prevents particles escaping upward)
[[wall]]
point_x = 0.0
point_y = 0.0
point_z = 0.025
normal_x = 0.0
normal_y = 0.0
normal_z = -1.0
material = "rubber"
name = "ceiling"

# ── Measurement plane ───────────────────────────────────────────────────────
#
# Counts particles crossing x=0.08 in the +x direction (belt flow direction).
# Reports total crossings, mass flow rate (kg/s), and crossing rate (1/s).

[[measure_plane]]
name = "outlet"
point = [0.08, 0.0, 0.0]
normal = [1.0, 0.0, 0.0]
report_interval = 5000

# ── Output settings ─────────────────────────────────────────────────────────

[vtp]
interval = 5000

[thermo]
columns = ["step", "atoms", "ke", "crossings_outlet", "flow_rate_outlet", "walltime", "stepps"]

# ── Run ──────────────────────────────────────────────────────────────────────

[run]
steps = 500000
thermo = 5000
