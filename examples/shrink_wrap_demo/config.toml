# Shrink-wrap boundary demo: particles falling under gravity.
# The z-axis uses shrink-wrap boundaries so the box top tracks the highest particle.

[comm]
processors_x = 1
processors_y = 1
processors_z = 1

[neighbor]
skin_fraction = 1.1
bin_size = 0.005
rebuild_on_pbc_wrap = true

[domain]
# Box extents [m]
x_low = 0.0
x_high = 0.02
y_low = 0.0
y_high = 0.02
z_low = 0.0
z_high = 0.04
# X and Y are periodic, Z uses shrink-wrap
periodic_x = true
periodic_y = true
periodic_z = false
boundary_z = "shrink-wrap"
# Optional: explicit padding (0 = auto from ghost cutoff)
# shrink_wrap_padding = 0.002

[[dem.materials]]
name = "glass"
youngs_mod = 8.7e9
poisson_ratio = 0.3
restitution = 0.9
friction = 0.4

[[particles.insert]]
material = "glass"
count = 200
radius = 0.001
density = 2500.0
velocity = 0.1

[gravity]
gz = -9.81

[[walls]]
name = "floor"
wall_type = "plane"
point = [0.0, 0.0, 0.0]
normal = [0.0, 0.0, 1.0]
material = "glass"

[run]
thermo = 1000
steps = 500000
dt = 1e-6

[thermo]
columns = ["step", "atoms", "ke"]

[dump]
interval = 5000
format = "text"

[vtp]
interval = 5000
