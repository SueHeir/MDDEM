# LAMMPS-equivalent LJ benchmark: 32,000 atoms, 100 steps
# Matches bench/in.lj: rho*=0.8442, cutoff=2.5sigma, 55 neighbors/atom
# Domain: 20x20x20 FCC unit cells (4 atoms/cell = 32,000 atoms)

[comm]
processors_x = 1
processors_y = 1
processors_z = 1

[domain]
x_low = 0.0
x_high = 33.591924
y_low = 0.0
y_high = 33.591924
z_low = 0.0
z_high = 33.591924
boundary_x = "periodic"
boundary_y = "periodic"
boundary_z = "periodic"

[neighbor]
skin_fraction = 1.12
bin_size = 1.0
every = 20
check = true

[lattice]
style = "fcc"
density = 0.8442
temperature = 1.44
mass = 1.0
skin = 1.25

[lj]
epsilon = 1.0
sigma = 1.0
cutoff = 2.5

[thermostat]
temperature = 1.44
coupling = 1.0

[run]
steps = 100
thermo = 10

[measure]
rdf_bins = 200
rdf_cutoff = 3.0
rdf_interval = 1000
msd_interval = 1000
output_interval = 1000

[dump]
interval = 0
