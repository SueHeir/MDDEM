# Long validation config for lj_argon (50k steps)
[domain]
x_low = 0.0
x_high = 10.06
y_low = 0.0
y_high = 10.06
z_low = 0.0
z_high = 10.06
periodic_x = true
periodic_y = true
periodic_z = true

[neighbor]
skin_fraction = 1.12
bin_size = 1.0

[lattice]
style = "fcc"
density = 0.85
temperature = 0.85
mass = 1.0
skin = 1.25

[lj]
epsilon = 1.0
sigma = 1.0
cutoff = 2.5

[thermostat]
temperature = 0.85
coupling = 1.0

[run]
steps = 50000
thermo = 5000

[measure]
rdf_bins = 200
rdf_cutoff = 3.0
rdf_interval = 100
msd_interval = 10
output_interval = 5000

[dump]
interval = 0
