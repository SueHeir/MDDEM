# Brazilian Disk Tensile Test Benchmark
#
# A bonded hex-lattice disk compressed between two platens until tensile failure.
# Disk: radius = 0.01 m, particle radius = 0.0005 m (~313 particles).
#
# Walls start in contact with the disk surface (zero gap).
# Global viscous damping ensures quasi-static loading.

[domain]
x_low  = -0.020
x_high =  0.020
y_low  = -0.002
y_high =  0.002
z_low  = -0.020
z_high =  0.020
periodic_x = false
periodic_y = false
periodic_z = false

[neighbor]
skin_fraction = 1.1
bin_size = 0.002

[output]
dir = "examples/bench_brazilian_disk"

# ── Material ──────────────────────────────────────────────────────────────

[[dem.materials]]
name = "rock"
youngs_mod = 5.0e7       # Young's modulus [Pa]
poisson_ratio = 0.25
restitution = 0.5
friction = 0.5

# ── Walls (platens) ──────────────────────────────────────────────────────
# Walls touching disk surface: z_surface = 0.00866025 + 0.0005 = 0.00916025

# Bottom platen — normal +z, moves up at 0.1 mm/s.
[[wall]]
wall_type = "plane"
point_x = 0.0
point_y = 0.0
point_z = -0.00916025
normal_x = 0.0
normal_y = 0.0
normal_z = 1.0
material = "rock"
velocity = [0.0, 0.0, 0.0001]

# Top platen — normal -z, moves down at 0.1 mm/s.
[[wall]]
wall_type = "plane"
point_x = 0.0
point_y = 0.0
point_z = 0.00916025
normal_x = 0.0
normal_y = 0.0
normal_z = -1.0
material = "rock"
velocity = [0.0, 0.0, -0.0001]

# ── Bonds ─────────────────────────────────────────────────────────────────

[bonds]
auto_bond = true
bond_tolerance = 1.05
normal_stiffness = 1.0e5
normal_damping = 0.0             # Using global viscous instead
tangential_stiffness = 5.0e4
tangential_damping = 0.0         # Using global viscous instead
break_normal_stretch = 0.15      # Break at 15% normal strain

# ── Global viscous damping for quasi-static loading ──────────────────────

[[viscous]]
group = "all"
gamma = 5.0                      # Quasi-static damping (prevents cascade)

# ── Thermo output ─────────────────────────────────────────────────────────

[thermo]
columns = ["step", "ke", "bond_strain", "bonds_broken", "walltime"]

# ── Run ───────────────────────────────────────────────────────────────────
# dt = 5e-7 s, wall speed 0.1 mm/s each:
#   500k steps = 0.25 s = 25 um wall travel each = 50 um total compression
#   15% of 1mm bond = 150 um → pole bonds should break, interior survives

[run]
steps = 500000
dt = 5.0e-7
thermo = 100

[dump]
interval = 50000
