# Triaxial compression benchmark — σ₃ = 50 kPa confining pressure
#
# Box: 0.01 × 0.01 × 0.10 m (walled, non-periodic)
# Particles: 500 spheres, r = 1 mm, ρ = 2500 kg/m³
# Material: E = 5e7 Pa, ν = 0.3, e = 0.3, μ = 0.5
# Servo walls maintain lateral confining pressure; top wall compressed axially.

[comm]
processors_x = 1
processors_y = 1
processors_z = 1

[domain]
x_low  = -0.005
x_high = 0.015
y_low  = -0.005
y_high = 0.015
z_low  = -0.005
z_high = 0.16
periodic_x = false
periodic_y = false
periodic_z = false

[neighbor]
skin_fraction = 1.1
bin_size = 0.003

[gravity]
gz = -9.81

[dem]
contact_model = "hertz"

[[dem.materials]]
name = "granular"
youngs_mod = 5e7
poisson_ratio = 0.3
restitution = 0.3
friction = 0.5

[[particles.insert]]
material = "granular"
count = 500
radius = 0.001
density = 2500.0
region = { type = "block", min = [0.001, 0.001, 0.001], max = [0.009, 0.009, 0.149] }

[triaxial]
confining_pressure = 50000.0    # σ₃ [Pa]

[output]
dir = "examples/bench_triaxial/data_50kPa"

# Servo target_force = σ₃ × wall_area
#   σ₃ = 50 kPa, wall area ≈ 0.01 × 0.035 = 3.5e-4 m²
#   target_force = 50000 × 3.5e-4 = 17.5 N

# Wall 0: x = 0, normal +x (left, servo)
[[wall]]
point_x = 0.0
point_y = 0.0
point_z = 0.0
normal_x = 1.0
normal_y = 0.0
normal_z = 0.0
material = "granular"
servo = { target_force = 17.5, max_velocity = 0.002, gain = 0.0004 }

# Wall 1: x = 0.01, normal −x (right, servo)
[[wall]]
point_x = 0.01
point_y = 0.0
point_z = 0.0
normal_x = -1.0
normal_y = 0.0
normal_z = 0.0
material = "granular"
servo = { target_force = 17.5, max_velocity = 0.002, gain = 0.0004 }

# Wall 2: y = 0, normal +y (front, servo)
[[wall]]
point_x = 0.0
point_y = 0.0
point_z = 0.0
normal_x = 0.0
normal_y = 1.0
normal_z = 0.0
material = "granular"
servo = { target_force = 17.5, max_velocity = 0.002, gain = 0.0004 }

# Wall 3: y = 0.01, normal −y (back, servo)
[[wall]]
point_x = 0.0
point_y = 0.01
point_z = 0.0
normal_x = 0.0
normal_y = -1.0
normal_z = 0.0
material = "granular"
servo = { target_force = 17.5, max_velocity = 0.002, gain = 0.0004 }

# Wall 4: z = 0, normal +z (floor, static)
[[wall]]
point_x = 0.0
point_y = 0.0
point_z = 0.0
normal_x = 0.0
normal_y = 0.0
normal_z = 1.0
material = "granular"

# Wall 5: z = 0.10, normal −z (top, static — moved by custom system)
[[wall]]
point_x = 0.0
point_y = 0.0
point_z = 0.15
normal_x = 0.0
normal_y = 0.0
normal_z = -1.0
material = "granular"

# ── Stages ───────────────────────────────────────────────────────────────────

[[run]]
name = "insert"
steps = 1200000
thermo = 20000

[[run]]
name = "relax"
steps = 200000
thermo = 10000

[[run]]
name = "compress"
steps = 600000
thermo = 500
gravity.gz = 0.0
