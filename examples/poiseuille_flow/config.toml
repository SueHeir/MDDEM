[domain]
x_low = 0.0
x_high = 10.06
y_low = 0.0
y_high = 10.06
z_low = 0.0
z_high = 10.06
periodic_x = true
periodic_y = true
periodic_z = false

[neighbor]
skin_fraction = 1.12
bin_size = 1.0

[lattice]
style = "fcc"
density = 0.85
temperature = 0.85
mass = 1.0
skin = 1.25

[lj]
epsilon = 1.0
sigma = 1.0
cutoff = 2.5

# Wall groups: bottom and top slabs
[[group]]
name = "wall_bottom"
region_z_low = 0.0
region_z_high = 2.5

[[group]]
name = "wall_top"
region_z_low = 7.5
region_z_high = 10.06

[[group]]
name = "fluid"
region_z_low = 2.5
region_z_high = 7.5

# Freeze wall atoms
[[freeze]]
group = "wall_bottom"

[[freeze]]
group = "wall_top"

# Body force on fluid in x-direction
[[addforce]]
group = "fluid"
fx = 0.05

# Langevin thermostat on fluid only
[langevin]
temperature = 0.85
damping = 1.0
seed = 54321
group = "fluid"

[run]
steps = 10000
thermo = 100

[measure]
rdf_bins = 0
msd_interval = 0
output_interval = 0

[dump]
interval = 1000
