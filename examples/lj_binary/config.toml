# ── Binary Lennard-Jones mixture (Kob-Andersen glass-former) ──
#
# 80:20 mixture of A and B particles with non-additive LJ interactions.
# At T*=1.0 this is a normal liquid; below T*≈0.45 it forms a glass.
# Reference: Kob & Andersen, PRE 51, 4626 (1995).

# ── Domain ──────────────────────────────────────────────────────────────
[domain]
boundaries_low = [0, 0, 0]
boundaries_high = [9.4, 9.4, 9.4]
is_periodic = [true, true, true]

# ── Lattice initialization ──────────────────────────────────────────────
# FCC lattice at LJ density ρ*=1.2 (standard for Kob-Andersen)
# 80% type 0 (A), 20% type 1 (B)
[lattice]
style = "fcc"
density = 1.2
temperature = 1.0
mass = 1.0
skin = 1.0
type_fractions = [0.8, 1.0]

# ── Lennard-Jones pair interactions ─────────────────────────────────────
# Kob-Andersen parameters with non-additive mixing
[lj]
epsilon = 1.0
sigma = 1.0
cutoff = 2.5
mixing = "geometric"

# Two types: A (type 0) and B (type 1)
[[lj.types]]
epsilon = 1.0
sigma = 1.0

[[lj.types]]
epsilon = 0.5
sigma = 0.88

# Override cross-term (non-additive mixing is essential for KA model)
[[lj.pair_coeffs]]
types = [0, 1]
epsilon = 1.5
sigma = 0.8

# ── Thermostat ──────────────────────────────────────────────────────────
# Langevin thermostat at T*=1.0 (liquid state, well above glass transition)
[langevin]
temperature = 1.0
damping = 1.0
seed = 42

# ── Run stages ──────────────────────────────────────────────────────────
# Stage 1: equilibration (5000 steps)
# Stage 2: production with measurements (15000 steps)
[[run]]
steps = 5000
thermo = 1000

[[run]]
steps = 15000
thermo = 2000

# ── Measurements ────────────────────────────────────────────────────────
[measure]
rdf_bins = 200
rdf_cutoff = 4.0
rdf_interval = 50
msd_interval = 10
output_interval = 5000

# ── Per-type MSD ────────────────────────────────────────────────────────
[msd]
interval = 10
output_interval = 5000

# ── Partial radial distribution functions ───────────────────────────────
# g_AA(r): A-A correlations (type 0 - type 0)
[[type_rdf]]
type_i = 0
type_j = 0
bins = 200
cutoff = 4.0
interval = 50
output_interval = 5000

# g_AB(r): A-B cross-correlations (type 0 - type 1)
[[type_rdf]]
type_i = 0
type_j = 1
bins = 200
cutoff = 4.0
interval = 50
output_interval = 5000

# g_BB(r): B-B correlations (type 1 - type 1)
[[type_rdf]]
type_i = 1
type_j = 1
bins = 200
cutoff = 4.0
interval = 50
output_interval = 5000

# ── Output ──────────────────────────────────────────────────────────────
[print]
thermo_style = ["step", "temp", "ke", "pe"]
