# ============================================================================
# MDDEM Example Template — Minimal DEM Granular Simulation
# ============================================================================
# Copy this file and customize for your simulation.
# Run with: cargo run --example example_template --no-default-features -- examples/example_template/config.toml
# Generate default config: cargo run --example example_template --no-default-features -- --generate-config

# ── MPI Processor Layout ────────────────────────────────────────────────────
# Product of processors must equal total MPI ranks. For single-process, use 1×1×1.
[comm]
processors_x = 1
processors_y = 1
processors_z = 1

# ── Neighbor List Settings ──────────────────────────────────────────────────
[neighbor]
# Skin fraction enlarges the neighbor search cutoff (dimensionless, typically 1.0–1.5).
# Larger = fewer rebuilds but more pairs to check per step.
skin_fraction = 1.1
# Bin size for spatial binning [meters]. Should be >= largest particle diameter.
bin_size = 0.005

# ── Simulation Domain ──────────────────────────────────────────────────────
[domain]
# Box extents [meters]
x_low = 0.0
x_high = 0.02
y_low = 0.0
y_high = 0.02
z_low = 0.0
z_high = 0.02
# Periodic boundary conditions (true = particles wrap around)
periodic_x = true
periodic_y = true
periodic_z = true

# ── Material Definitions ───────────────────────────────────────────────────
# Each material needs a unique name. Particles and walls reference materials by name.
# For multi-material simulations, add more [[dem.materials]] blocks.
[[dem.materials]]
name = "glass"
youngs_mod = 8.7e9       # Young's modulus [Pa] — higher = stiffer contacts
poisson_ratio = 0.3      # Poisson's ratio [dimensionless, 0–0.5]
restitution = 0.95       # Coefficient of restitution [0=perfectly inelastic, 1=elastic]
friction = 0.4           # Sliding (Coulomb) friction coefficient [dimensionless]
# rolling_friction = 0.0 # Rolling friction coefficient (0 = disabled)
# cohesion_energy = 0.0  # SJKR cohesion energy density [J/m²] (0 = disabled)
# surface_energy = 0.0   # JKR surface energy [J/m²] (0 = disabled)
# twisting_friction = 0.0 # Twisting friction coefficient (0 = disabled)

# ── Particle Insertion ─────────────────────────────────────────────────────
# Insert particles at the start of the simulation.
# For rate-based insertion, add: rate = 100, rate_interval = 10
# For file-based insertion, add: source = "file", format = "csv", file = "particles.csv"
[[particles.insert]]
material = "glass"       # Must match a [[dem.materials]] name
count = 100              # Number of particles to insert
radius = 0.001           # Particle radius [m] (or use size distribution — see docs)
density = 2500.0         # Particle density [kg/m³]
velocity = 0.1           # Random initial velocity magnitude [m/s]

# ── Run Settings ───────────────────────────────────────────────────────────
# Single stage: use [run]. Multi-stage: use [[run]] with name = "stage_name".
[run]
steps = 10000            # Total timesteps
thermo = 100             # Print thermo output every N steps
# dt = 1e-6             # Timestep [s] (auto-calculated if omitted for DEM)
# dump_interval = 1000  # Write dump file every N steps
# restart_interval = 5000 # Write restart file every N steps

# ── Gravity (requires GravityPlugin) ──────────────────────────────────────
# [gravity]
# gx = 0.0              # Gravitational acceleration x-component [m/s²]
# gy = -9.81            # Gravitational acceleration y-component [m/s²]
# gz = 0.0              # Gravitational acceleration z-component [m/s²]

# ── Walls (requires WallPlugin) ──────────────────────────────────────────
# [[wall]]
# type = "plane"         # "plane", "cylinder", or "sphere"
# material = "glass"     # Wall material (uses same [[dem.materials]])
# normal_x = 0.0         # Wall normal direction
# normal_y = 1.0
# normal_z = 0.0
# point_y = 0.0          # A point on the wall plane [m]
