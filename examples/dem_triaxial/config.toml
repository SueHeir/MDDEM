# DEM triaxial compression: insert particles, settle, then compress z-axis
# at a constant engineering strain rate using fix deform.
#
# Three stages: insert → relax → compress
# The compress stage uses per-stage config override to activate deformation.

[comm]
processors_x = 1
processors_y = 1
processors_z = 1

[domain]
x_low = 0.0
x_high = 0.02
y_low = 0.0
y_high = 0.02
z_low = 0.0
z_high = 0.06
periodic_x = false
periodic_y = false
periodic_z = false

[neighbor]
skin_fraction = 1.1
bin_size = 0.003

[gravity]
gz = -9.81

[[dem.materials]]
name = "glass"
youngs_mod = 8.7e9
poisson_ratio = 0.3
restitution = 0.5
friction = 0.4

[[particles.insert]]
material = "glass"
count = 300
radius = 0.001
density = 2500.0

# Left wall (x = 0, normal +x)
[[wall]]
point_x = 0.0
point_y = 0.0
point_z = 0.0
normal_x = 1.0
normal_y = 0.0
normal_z = 0.0
material = "glass"

# Right wall (x = 0.02, normal -x)
[[wall]]
point_x = 0.02
point_y = 0.0
point_z = 0.0
normal_x = -1.0
normal_y = 0.0
normal_z = 0.0
material = "glass"

# Front wall (y = 0, normal +y)
[[wall]]
point_x = 0.0
point_y = 0.0
point_z = 0.0
normal_x = 0.0
normal_y = 1.0
normal_z = 0.0
material = "glass"

# Back wall (y = 0.02, normal -y)
[[wall]]
point_x = 0.0
point_y = 0.02
point_z = 0.0
normal_x = 0.0
normal_y = -1.0
normal_z = 0.0
material = "glass"

# Floor (z = 0, normal +z)
[[wall]]
point_x = 0.0
point_y = 0.0
point_z = 0.0
normal_x = 0.0
normal_y = 0.0
normal_z = 1.0
material = "glass"

# Stage 1: insert particles and let them settle
[[run]]
name = "insert"
steps = 500000
thermo = 5000

# Stage 2: relax to equilibrium
[[run]]
name = "relax"
steps = 200000
thermo = 2000

# Stage 3: compress z-axis at constant strain rate using fix deform
# Engineering strain rate of -0.001 means 0.1% compression per unit time
[[run]]
name = "compress"
steps = 500000
thermo = 1000
deform.z = { style = "erate", rate = -0.001 }
