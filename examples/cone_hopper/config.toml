# Conical hopper discharge using region-surface walls.
# A cone region wall contains particles that drain through the narrow end.

[comm]
processors_x = 1
processors_y = 1
processors_z = 1

[domain]
x_low = 0.0
x_high = 0.04
y_low = 0.0
y_high = 0.04
z_low = 0.0
z_high = 0.08
periodic_x = false
periodic_y = false
periodic_z = false

[neighbor]
skin_fraction = 1.1
bin_size = 0.005

[gravity]
gz = -90.81              # Enhanced gravity for faster settling [m/s²]

[[dem.materials]]
name = "glass"
youngs_mod = 8.7e9       # Young's modulus [Pa]
poisson_ratio = 0.3
restitution = 0.3        # Low restitution for heavy damping
friction = 0.5

[[particles.insert]]
material = "glass"
count = 200
radius = 0.001           # Particle radius [m]
density = 2500.0         # Particle density [kg/m³]
velocity_z = -1.0
region = { type = "block", min = [0.01, 0.01, 0.05], max = [0.03, 0.03, 0.07] }

# Conical hopper wall: particles inside a cone that narrows downward
# rad_lo = wide end at z=0.01, rad_hi = narrow exit at z=0.05
[[wall]]
type = "region"
region = { type = "cone", center = [0.02, 0.02], axis = "z", rad_lo = 0.004, rad_hi = 0.015, lo = 0.01, hi = 0.05 }
material = "glass"
inside = true

# Ceiling wall to keep particles from escaping upward
[[wall]]
point_x = 0.0
point_y = 0.0
point_z = 0.07
normal_x = 0.0
normal_y = 0.0
normal_z = -1.0
material = "glass"

# Floor wall to catch particles after discharge
[[wall]]
point_x = 0.0
point_y = 0.0
point_z = 0.0
normal_x = 0.0
normal_y = 0.0
normal_z = 1.0
material = "glass"

# Blocker wall at the narrow end of the cone (removed when settled)
[[wall]]
point_x = 0.0
point_y = 0.0
point_z = 0.01
normal_x = 0.0
normal_y = 0.0
normal_z = 1.0
material = "glass"
name = "blocker"

[vtp]
interval = 1000

# Stage 1: fill the hopper
[[run]]
name = "filling"
steps = 500000
thermo = 2000

# Stage 2: blocker removed, particles discharge
[[run]]
name = "flowing"
steps = 500000
thermo = 2000
