# Polymer melt simulation
# Multiple chains in a periodic box at moderate density
# Kremer-Grest model: FENE bonds + WCA (repulsive LJ) + Langevin thermostat

[domain]
x_low = 0.0
x_high = 20.0
y_low = 0.0
y_high = 20.0
z_low = 0.0
z_high = 20.0
periodic_x = true
periodic_y = true
periodic_z = true

[neighbor]
skin_fraction = 1.12
bin_size = 1.5

# Polymer initialization: 20 chains of 20 beads each = 400 beads
# Number density ρ = 400/8000 = 0.05 (dilute melt)
[polymer_init]
n_chains = 20
chain_length = 20
bond_length = 0.97
mass = 1.0
init_style = "random_walk"
seed = 12345
skin = 1.25
temperature = 1.0

# Chain statistics measurement
[chain_stats]
measure_interval = 200
output_interval = 5000
equilibration_steps = 5000

# FENE bond potential (Kremer-Grest parameters)
[md_bond]
style = "fene"
k = 30.0
r0 = 1.5
k_angle = 0.0    # fully flexible chains

# WCA (repulsive LJ) for excluded volume
[lj]
epsilon = 1.0
sigma = 1.0
cutoff = 1.122462    # 2^(1/6) sigma

# Langevin thermostat
[langevin]
temperature = 1.0
damping = 1.0
seed = 54321

# Measurements: RDF, MSD, pressure
[measure]
rdf_bins = 200
rdf_cutoff = 5.0
rdf_interval = 500
msd_interval = 100
output_interval = 5000

[run]
steps = 50000
dt = 0.005
thermo = 5000

[dump]
interval = 0
