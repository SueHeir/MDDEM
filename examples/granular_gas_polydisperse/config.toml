# Polydisperse granular gas — binary mixture for equipartition breakdown study
#
# Two particle species (small + large) in a periodic box. The velocity
# distribution plugin measures per-species granular temperature to show
# how energy equipartition breaks down in dissipative granular gases.
#
# Key physics: In a granular gas with inelastic collisions, the granular
# temperature of each species differs. Lighter particles tend to have
# higher T_g than heavier ones, violating energy equipartition.
#
# Reference: Feitosa & Kudrolli, PRL 88, 198301 (2002)
#            Barrat & Trizac, Granular Matter 4, 57-63 (2002)

[comm]
processors_x = 1
processors_y = 1
processors_z = 1

[neighbor]
skin_fraction = 1.1
bin_size = 0.006
every = 1
rebuild_on_pbc_wrap = true

[domain]
x_low = 0.0
x_high = 0.04
y_low = 0.0
y_high = 0.04
z_low = 0.0
z_high = 0.04
periodic_x = true
periodic_y = true
periodic_z = true

# Two materials with the same mechanical properties but different
# restitution to enhance dissipation and equipartition breakdown.
[[dem.materials]]
name = "small"
youngs_mod = 5.0e8
poisson_ratio = 0.3
restitution = 0.85
friction = 0.3

[[dem.materials]]
name = "large"
youngs_mod = 5.0e8
poisson_ratio = 0.3
restitution = 0.85
friction = 0.3

# Small particles: r = 0.001 m, ρ = 2500 kg/m³
# Mass = (4/3)π(0.001)³ × 2500 ≈ 1.05e-5 kg
[[particles.insert]]
material = "small"
count = 300
radius = 0.001
density = 2500.0
velocity = 0.5

# Large particles: r = 0.002 m, ρ = 2500 kg/m³
# Mass = (4/3)π(0.002)³ × 2500 ≈ 8.38e-5 kg (8× heavier)
[[particles.insert]]
material = "large"
count = 100
radius = 0.002
density = 2500.0
velocity = 0.5

[velocity_distribution]
interval = 2000
num_bins = 40
max_speed_factor = 3.5
per_species = true
# Collapse detection — warn if T_g drops too low
collapse_threshold = 1e-10
collapse_rate_window = 10

[output]
dir = "examples/granular_gas_polydisperse/output"

# Stage 1: Let system evolve and measure distributions
[[run]]
name = "evolve"
thermo = 1000
steps = 100000
