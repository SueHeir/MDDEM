[domain]
x_low = 0.0
x_high = 10.06
y_low = 0.0
y_high = 10.06
z_low = 0.0
z_high = 10.06
periodic_x = true
periodic_y = true
periodic_z = true

[neighbor]
skin_fraction = 1.12
bin_size = 1.0

[lattice]
style = "fcc"
density = 0.85
temperature = 0.85
mass = 1.0
skin = 1.25

[lj]
epsilon = 1.0
sigma = 1.0
cutoff = 2.5

[[group]]
name = "frozen"
region_z_low = 0.0
region_z_high = 3.0

[[group]]
name = "mobile"
region_z_low = 3.0
region_z_high = 10.06

[[freeze]]
group = "frozen"

[thermostat]
temperature = 0.85
coupling = 1.0
group = "mobile"

[run]
steps = 5000
thermo = 100

[thermo]
columns = ["step", "atoms", "temp", "temp/mobile", "ke", "walltime", "stepps"]

[dump]
interval = 1000

[measure]
rdf_bins = 0
msd_interval = 0
output_interval = 0
