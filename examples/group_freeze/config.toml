# LJ group freeze: demonstrates per-stage group redefinition
# All values in reduced (Lennard-Jones) units: length=sigma, energy=epsilon, mass=m

# Simulation box dimensions in reduced units (sigma)
[domain]
x_low = 0.0
x_high = 10.06
y_low = 0.0
y_high = 10.06
z_low = 0.0
z_high = 10.06
periodic_x = true
periodic_y = true
periodic_z = true

# Neighbor list settings (reduced units)
[neighbor]
skin_fraction = 1.12  # Extra distance beyond cutoff for neighbor search (sigma)
bin_size = 1.0        # Spatial bin width for neighbor binning (sigma)

# FCC lattice initialization
[lattice]
style = "fcc"
density = 0.85       # Reduced number density rho* = N*sigma^3/V
temperature = 0.85   # Initial reduced temperature T* = kT/epsilon
mass = 1.0
skin = 1.25

# Lennard-Jones pair potential parameters
[lj]
epsilon = 1.0  # Well depth (energy scale)
sigma = 1.0    # Particle diameter (length scale)
cutoff = 2.5   # Interaction cutoff in units of sigma

# "frozen" uses a region but dynamic = false locks membership at setup time,
# so atoms that drift out of the region stay frozen.
[[group]]
name = "frozen"
region = { type = "block", min = [-1e30, -1e30, 0.0], max = [1e30, 1e30, 3.0] }
dynamic = false

# "mobile" is type-only (no region), so it's static by default — no need to
# re-evaluate every timestep since atom types don't change.
[[group]]
name = "mobile"
region = { type = "block", min = [-1e30, -1e30, 3.0], max = [1e30, 1e30, 10.06] }
dynamic = false

[[freeze]]
group = "frozen"

# Nose-Hoover thermostat applied only to the "mobile" group
[thermostat]
temperature = 0.85  # Target reduced temperature T*
coupling = 1.0      # Thermostat coupling time constant (reduced time units)
group = "mobile"    # Only thermostat atoms in this group

# Stage 1: equilibrate with a thick frozen slab
[[run]]
name = "equilibrate"
steps = 5000
thermo = 100

# Stage 2: shrink the frozen region and add a "top" group
# Per-stage [[run.group]] redefines "frozen" to a thinner slab and adds "top".
[[run]]
name = "release"
steps = 5000
thermo = 100
[[run.group]]
name = "frozen"
region = { type = "block", min = [-1e30, -1e30, 0.0], max = [1e30, 1e30, 1.5] }
dynamic = false
[[run.group]]
name = "top"
region = { type = "block", min = [-1e30, -1e30, 8.0], max = [1e30, 1e30, 10.06] }

# Custom thermo columns: "temp/mobile" shows temperature of only the mobile group
[thermo]
columns = ["step", "atoms", "temp", "temp/mobile", "ke", "walltime", "stepps"]

[dump]
interval = 1000

# Measurements disabled for this example
[measure]
rdf_bins = 0
msd_interval = 0
output_interval = 0
