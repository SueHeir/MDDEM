# LJ performance benchmark: 32,000 atoms, 500 steps
# Domain: 20x20x20 FCC unit cells (4 atoms/cell = 32,000 atoms)
# All values in reduced (Lennard-Jones) units

[comm]
processors_x = 1
processors_y = 1
processors_z = 1

# Simulation box dimensions in reduced units (sigma)
[domain]
x_low = 0.0
x_high = 33.591924
y_low = 0.0
y_high = 33.591924
z_low = 0.0
z_high = 33.591924
periodic_x = true
periodic_y = true
periodic_z = true

# Neighbor list settings (reduced units)
[neighbor]
skin_fraction = 1.12  # Extra distance beyond cutoff for neighbor search (sigma)
bin_size = 1.4        # Spatial bin width for neighbor binning (sigma)
every = 20            # Rebuild neighbor list every N steps (skip rebuilds for speed)
check = true          # Check if any atom moved far enough to require early rebuild

# FCC lattice initialization
[lattice]
style = "fcc"
density = 0.8442     # Reduced number density rho* = N*sigma^3/V (liquid argon at triple point)
temperature = 1.44   # Initial reduced temperature T* = kT/epsilon
mass = 1.0
skin = 1.25

# Lennard-Jones pair potential parameters
[lj]
epsilon = 1.0  # Well depth (energy scale)
sigma = 1.0    # Particle diameter (length scale)
cutoff = 2.5   # Interaction cutoff in units of sigma

# Nose-Hoover NVT thermostat
[thermostat]
temperature = 1.44  # Target reduced temperature T*
coupling = 1.0      # Thermostat coupling time constant (reduced time units)

[run]
steps = 500
thermo = 50

# Dump (trajectory) output
[dump]
interval = 0  # 0 = no dump output
