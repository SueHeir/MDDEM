# DEM compression test: particles settle under gravity, then are compressed with 100x gravity.
# Three stages: insert, relax, and compress.

[comm]
processors_x = 1
processors_y = 1
processors_z = 1

[domain]
# Simulation box extents [m]
x_low = 0.0
x_high = 0.02
y_low = 0.0
y_high = 0.02
z_low = 0.0
z_high = 0.06
periodic_x = false
periodic_y = false
periodic_z = false

[neighbor]
# skin_fraction: neighbor search radius multiplier [dimensionless, typically 1.0–1.5]
skin_fraction = 1.1
# bin_size: neighbor-list bin width [m] — should be >= largest particle diameter
bin_size = 0.003

[gravity]
gz = -9.81               # Gravitational acceleration [m/s²]

[[dem.materials]]
name = "glass"
youngs_mod = 8.7e9       # Young's modulus [Pa]
poisson_ratio = 0.3      # Poisson's ratio [dimensionless, 0–0.5]
restitution = 0.5        # Coefficient of restitution [0–1]
friction = 0.4           # Sliding friction coefficient [dimensionless]

[[particles.insert]]
material = "glass"
count = 300              # Number of particles to insert
radius = 0.001           # Particle radius [m]
density = 2500.0         # Particle density [kg/m³]

# Left wall (x = 0, normal +x)
[[wall]]
point_x = 0.0
point_y = 0.0
point_z = 0.0
normal_x = 1.0
normal_y = 0.0
normal_z = 0.0
material = "glass"

# Right wall (x = 0.02, normal -x)
[[wall]]
point_x = 0.02
point_y = 0.0
point_z = 0.0
normal_x = -1.0
normal_y = 0.0
normal_z = 0.0
material = "glass"

# Front wall (y = 0, normal +y)
[[wall]]
point_x = 0.0
point_y = 0.0
point_z = 0.0
normal_x = 0.0
normal_y = 1.0
normal_z = 0.0
material = "glass"

# Back wall (y = 0.02, normal -y)
[[wall]]
point_x = 0.0
point_y = 0.02
point_z = 0.0
normal_x = 0.0
normal_y = -1.0
normal_z = 0.0
material = "glass"

# Floor (z = 0, normal +z)
[[wall]]
point_x = 0.0
point_y = 0.0
point_z = 0.0
normal_x = 0.0
normal_y = 0.0
normal_z = 1.0
material = "glass"

# Stage 1: insert particles and let them settle under normal gravity
[[run]]
name = "insert"
steps = 500000
thermo = 5000

# Stage 2: additional relaxation to ensure particles are fully settled
[[run]]
name = "relax"
steps = 200000
thermo = 2000

# Stage 3: compress by overriding gravity to 100x (–981 m/s²) for this stage only
[[run]]
name = "compress"
steps = 500000
thermo = 1000
gravity.gz = -981.0      # Per-stage override: replaces global gz for this stage only [m/s²]
