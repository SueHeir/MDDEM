[package]
name = "mddem_core"
version = "0.1.0"
edition = "2021"

[features]
default = ["mpi_backend"]
mpi_backend = ["dep:mpi", "dep:libffi-sys"]

[dependencies]
mddem_scheduler = { path = "../mddem_scheduler" }
mddem_app = { path = "../mddem_app" }
mpi = { version = "0.8.0", features = ["user-operations", "derive"], optional = true }
libffi-sys = { version = "2.3.0", features = ["system"], optional = true }
nalgebra = "0.33.2"
serde = { version = "1", features = ["derive"] }
toml = "0.8"
