[package]
name = "mddem_velocity_distribution"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Velocity distribution analysis for particle simulations — bins particle speeds and compares against Maxwell-Boltzmann"

[dependencies]
grass_app = { git = "https://github.com/SueHeir/grass.git", rev = "ea21ea3629de990a717cc1421747901e5d64a66b" }
grass_scheduler = { git = "https://github.com/SueHeir/grass.git", rev = "ea21ea3629de990a717cc1421747901e5d64a66b" }
mddem_core = { path = "../mddem_core", default-features = false }
serde = { version = "1", features = ["derive"] }
