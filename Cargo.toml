[package]
name = "MDDEM"
version = "0.1.0"
license = "MIT OR Apache-2.0"
edition = "2021"


[workspace]
members = [
  "crates/*",
]

[package.metadata.scripts]
mpirun = "mpiexec -n 4 ./target/release/MDDEM input"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
#Internal
mddem_scheduler = { path = "./crates/mddem_scheduler"}
mddem_app = { path = "./crates/mddem_app"}
#External



mpi = { version = "0.8.0", features = ["user-operations", "derive"] }
# Force libffi-sys to use system libffi (via pkg-config) instead of building
# from source. libffi-sys 2.3.0 has a broken aarch64 macOS assembler; Homebrew
# libffi is set in .cargo/config.toml via PKG_CONFIG_PATH.
libffi-sys = { version = "2.3.0", features = ["system"] }
nalgebra = "0.33.2"
rand = "*"
rand_distr = "0.5.1"



